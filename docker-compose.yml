
version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: sweetsshoingweb-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sweetsshoingweb
    ports:
      - '51214:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
